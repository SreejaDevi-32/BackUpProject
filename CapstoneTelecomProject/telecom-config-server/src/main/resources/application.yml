server:
  port: 8071

spring:
  application:
    name: TELECOM-CONFIG-SERVER

  cloud:
    config:
      server:
        git:
          uri: https://github.com/SreejaDevi-32/config-repo
          clone-on-start: true

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      probes:
        enabled: true

  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true